  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a12;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      background: #111120;
      border-bottom: 1px solid #1e1e30;
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .toolbar-title { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: #4a4a6a; flex: 1; }
    .toolbar-title span { color: #d4843a; }
    .device-toggle { display: flex; gap: 2px; background: #0a0a12; border: 1px solid #1e1e30; border-radius: 6px; padding: 3px; }
    .device-btn {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.38rem 0.9rem; border: none; background: transparent;
      color: #4a4a6a; font-size: 0.7rem; letter-spacing: 0.08em;
      cursor: pointer; border-radius: 4px;
      transition: background 0.2s, color 0.2s; white-space: nowrap;
    }
    .device-btn.active { background: #1e1e30; color: #e8dfd0; }
    .device-btn:hover:not(.active) { color: #8080e0; }
    .width-badge {
      font-size: 0.65rem; letter-spacing: 0.1em; color: #4a4a6a;
      background: #0a0a12; border: 1px solid #1e1e30; border-radius: 4px;
      padding: 0.3rem 0.65rem; min-width: 68px; text-align: center;
    }
    .resize-hint { font-size: 0.62rem; color: #2a2a40; letter-spacing: 0.06em; }
    .stage { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 3rem; overflow-x: auto; }
    .device-frame {
      position: relative;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1), max-width 0.4s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; align-items: center;
    }
    .device-frame.desktop { width: 100%; max-width: 1280px; }
    .device-frame.tablet  { width: 768px; max-width: 768px; }
    .device-frame.mobile  { width: 390px; max-width: 390px; }
    .phone-chrome-top, .phone-chrome-bottom { display: none; width: 100%; background: #1a1a2e; align-items: center; justify-content: center; }
    .device-frame.mobile .phone-chrome-top    { display: flex; height: 44px; border-radius: 36px 36px 0 0; border: 1px solid #2a2a40; border-bottom: none; }
    .device-frame.mobile .phone-chrome-bottom { display: flex; height: 24px; border-radius: 0 0 36px 36px; border: 1px solid #2a2a40; border-top: none; }
    .phone-notch    { width: 100px; height: 14px; background: #0a0a12; border-radius: 0 0 12px 12px; }
    .phone-home-bar { width: 100px; height: 4px; background: #2a2a40; border-radius: 2px; }
    .browser-chrome { width: 100%; background: #111120; border: 1px solid #1e1e30; border-bottom: none; border-radius: 8px 8px 0 0; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
    .device-frame.mobile .browser-chrome { display: none; }
    .browser-dots { display: flex; gap: 5px; }
    .browser-dots span { width: 10px; height: 10px; border-radius: 50%; }
    .browser-url { flex: 1; background: #0a0a12; border: 1px solid #1e1e30; border-radius: 4px; padding: 0.25rem 0.75rem; font-size: 0.7rem; color: #4a4a6a; letter-spacing: 0.04em; text-align: center; }
    .preview-iframe { width: 100%; border: 1px solid #1e1e30; border-top: none; display: block; background: #080810; }
    .device-frame.desktop .preview-iframe { height: 800px;  border-radius: 0 0 4px 4px; }
    .device-frame.tablet  .preview-iframe { height: 1024px; border-radius: 0 0 4px 4px; }
    .device-frame.mobile  .preview-iframe { height: 844px;  border-left: 1px solid #2a2a40; border-right: 1px solid #2a2a40; }
    .device-frame::after { content: ""; position: absolute; bottom: -20px; left: 10%; right: 10%; height: 20px; background: radial-gradient(ellipse at center, rgba(74,74,158,0.3) 0%, transparent 70%); filter: blur(6px); pointer-events: none; }
    .resize-handle { position: absolute; top: 0; right: -14px; width: 14px; height: 100%; cursor: ew-resize; display: flex; align-items: center; justify-content: center; }
    .resize-handle-bar { width: 3px; height: 40px; background: #1e1e30; border-radius: 2px; transition: background 0.2s; }
    .resize-handle:hover .resize-handle-bar, .resize-handle:active .resize-handle-bar { background: #4a4a9e; }
  </style>

    var html = decodeURIComponent(escape(atob(b64)));
    document.getElementById("preview").srcdoc = html;

    var frame   = document.getElementById("device-frame");
    var badge   = document.getElementById("width-badge");
    var btns    = document.querySelectorAll(".device-btn");
    var resizeH = document.getElementById("resize-handle");
    var WIDTHS  = { desktop: 1280, tablet: 768, mobile: 390 };

    function setMode(mode) {
      frame.className = "device-frame " + mode;
      btns.forEach(function(b) { b.classList.toggle("active", b.dataset.mode === mode); });
      badge.textContent = WIDTHS[mode] + "px";
      frame.style.width = "";
      frame.style.maxWidth = "";
    }

    btns.forEach(function(btn) { btn.addEventListener("click", function() { setMode(btn.dataset.mode); }); });

    var dragging = false, startX, startW;
    resizeH.addEventListener("mousedown", function(e) {
      dragging = true; startX = e.clientX;
      startW = frame.getBoundingClientRect().width;
      document.body.style.userSelect = "none";
      document.body.style.cursor = "ew-resize";
      e.preventDefault();
    });
    document.addEventListener("mousemove", function(e) {
      if (!dragging) return;
      var newW = Math.max(320, Math.min(1600, startW + (e.clientX - startX)));
      frame.style.width = newW + "px";
      frame.style.maxWidth = newW + "px";
      badge.textContent = Math.round(newW) + "px";
    });
    document.addEventListener("mouseup", function() {
      if (dragging) { dragging = false; document.body.style.userSelect = ""; document.body.style.cursor = ""; }
    });
  </script>
